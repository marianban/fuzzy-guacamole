services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: comfy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      target: dev
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/comfy
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - '3000:3000'
      - '5173:5173'
    volumes:
      - ./:/app
      - /app/node_modules
      - ./data:/data
    command: npm run dev

volumes:
  postgres_data:
